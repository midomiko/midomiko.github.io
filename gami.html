<title>視覺小說</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;min-height:100vh;font-family:'Noto Serif TC',serif;overflow:auto;box-sizing:border-box;display:flex;justify-content:safe center;align-items:safe center}
#G{flex-shrink:0}
#G{position:relative;overflow:hidden;background:transparent;transform-origin:center center}
#BG{position:absolute;inset:0;z-index:0}
.GI{position:absolute;object-fit:contain;object-position:top left}
#DB{position:absolute;left:0;right:0;min-height:36%;padding:15px 26px 30px;user-select:none;z-index:100}
#DB.clickable{cursor:pointer}
#NN{font-size:15px;color:#A1BFD3;margin-bottom:7px;letter-spacing:1px}
#DT{font-size:15px;color:#e8e4dc;line-height:1.8}
#DT.free-pos{position:absolute;z-index:102;max-width:80%;}
.inline-arrow{display:inline-block;margin-left:5px;color:#A1BFD3;font-family:'Noto Serif TC',serif}
.inline-arrow img{vertical-align:middle}
@keyframes ab{0%,100%{opacity:1;transform:translateY(0)}50%{opacity:.3;transform:translateY(4px)}}
.ab-anim{animation:ab 1.1s ease-in-out infinite}
#ARW{position:absolute;bottom:8px;right:16px;z-index:150;font-size:18px;color:#A1BFD3;pointer-events:none;font-family:'Noto Serif TC',serif;display:none}
.TL{font-family:'Noto Serif TC',serif;line-height:1.8;overflow:hidden;box-sizing:border-box}
#ARW.ab-anim{animation:ab 1.1s ease-in-out infinite}
#CH{position:absolute;right:18px;bottom:14px;display:flex;flex-direction:column;gap:8px;align-items:flex-end;z-index:200}
.cb{background:rgba(10,12,18,.9);border:1px solid #A1BFD3;color:#A1BFD3;font-family:'Noto Serif TC',serif;font-size:14px;padding:7px 20px;cursor:pointer;transition:all .2s}
.cb:hover{background:#A1BFD3;color:#0a0a0f}
/* END: no built-in screen - creator defines their own ending */
</style>
</head>

function chk(d){
  const raw=d.conditions||'';
  if(!raw.trim())return true;
  return raw.split('\n').every(line=>{
    line=line.trim();if(!line)return true;
    let m;
    if(m=line.match(/^@sw_(\d+):(on|off)$/i)){return m[2].toLowerCase()==='on'?sw[+m[1]]===true:sw[+m[1]]===false;}
    if(m=line.match(/^@var_(\d+)(==|!=|>=|<=|>|<)(-?\d+)$/)){
      const v=vr[+m[1]]??0,r=+m[3];
      return m[2]==='=='?v==r:m[2]==='!='?v!=r:m[2]==='>'?v>r:m[2]==='>='?v>=r:m[2]==='<'?v<r:v<=r;
    }
    return true; // unknown line = skip (treat as met)
  });
}
function findNext(scene,from){for(let i=from;i<scene.dialogues.length;i++)if(chk(scene.dialogues[i]))return i;return -1;}

  }

    const DB2=document.getElementById('DB');
    if(DT.parentElement!==DB2) DB2.appendChild(DT);
  }

}

function setArrow(d,isLast){
  const ARW=document.getElementById('ARW'),DT=document.getElementById('DT');

}

// Transparent pixel check using canvas
function isClickOpaque(imgEl,e){
  try{
    const rect=imgEl.getBoundingClientRect();
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    if(cx<0||cy<0||cx>rect.width||cy>rect.height)return false;
    const cv=document.createElement('canvas');
    cv.width=imgEl.naturalWidth||imgEl.width||1;cv.height=imgEl.naturalHeight||imgEl.height||1;
    const ctx=cv.getContext('2d');ctx.drawImage(imgEl,0,0);
    const px=cx*cv.width/rect.width,py=cy*cv.height/rect.height;
    return ctx.getImageData(Math.floor(px),Math.floor(py),1,1).data[3]>10;
  }catch(err){return true;}
}

function parseAtConf(raw){
  const conf={conds:[],inFps:0,outFps:0,parallel:false};
  (raw||'').split('\n').forEach(line=>{
    line=line.trim();if(!line)return;
    let m;
    if(line==='@parallel'){conf.parallel=true;return;}
    if(m=line.match(/^@in\s+fps=(\d+)$/i)){conf.inFps=+m[1];return;}
    if(m=line.match(/^@out\s+fps=(\d+)$/i)){conf.outFps=+m[1];return;}
    if(m=line.match(/^@sw_(\d+):(on|off)$/i)){conf.conds.push({type:'sw',num:+m[1],val:m[2].toLowerCase()==='on'});return;}
    if(m=line.match(/^@var_(\\d+)(==|!=|>=|<=|>|<)(-?\\d+)$/)){conf.conds.push({type:'var',num:+m[1],op:m[2],val:+m[3]});}
  });
  return conf;
}
function checkAtConds(conds){
  return conds.every(c=>{
    if(c.type==='sw')return sw[c.num]===c.val;
    const v=vr[c.num]??0;
    return c.op==='=='?v==c.val:c.op==='!='?v!=c.val:c.op==='>'?v>c.val:c.op==='>='?v>=c.val:c.op==='<'?v<c.val:v<=c.val;
  });
}

    else{const c=cum;const t=setTimeout(()=>execTextAction(seg),c);s.tlTimers.push(t);}

}

    else if(s.st==='hoverIn'&&img.hoverInEnabled){if(img.hoverInText)txt=img.hoverInText;x=img.hoverInX||img.x;y=img.hoverInY||img.y;w=img.hoverInW||img.w;h=img.hoverInH||img.h;}
    showTLText(s.el,txt,s);
    s.el.style.left=x+'px';s.el.style.top=y+'px';
    s.el.style.width=w>0?w+'px':'auto';s.el.style.height=h>0?h+'px':'auto';
    return;
  }
  let src=img.src,x=img.x,y=img.y,w=img.w,h=img.h;
  if(s.st==='hoverOut'&&img.hoverOutEnabled&&img.hoverOutSrc){src=img.hoverOutSrc;x=img.hoverOutX||img.x;y=img.hoverOutY||img.y;w=img.hoverOutW||img.w;h=img.hoverOutH||img.h;}
  else if(s.st==='clicked'&&img.clickEnabled&&img.clickSrc){src=img.clickSrc;x=img.clickX||img.x;y=img.clickY||img.y;w=img.clickW||img.w;h=img.clickH||img.h;}
  else if(s.st==='hoverIn'&&img.hoverInEnabled&&img.hoverInSrc){src=img.hoverInSrc;x=img.hoverInX||img.x;y=img.hoverInY||img.y;w=img.hoverInW||img.w;h=img.hoverInH||img.h;}
  if(s.el.src!==src)s.el.src=src;
  s.el.style.left=x+'px';s.el.style.top=y+'px';
  s.el.style.width=w>0?w+'px':'auto';s.el.style.height=h>0?h+'px':'auto';
}
function imgAppear(idx,s){
  if(imgSM[idx]!==s||s.st!=='hidden')return;
  const img=cur&&cur.dialogues[di]?cur.dialogues[di].images[idx]:null;if(!img)return;
  s.st='base';showImgState(idx);
  if(s.atConf.outFps>0){
    s.outTimer=setTimeout(()=>{
      if(imgSM[idx]!==s)return;
      s.st='hidden';showImgState(idx);
      if(s.parallelRaf){cancelAnimationFrame(s.parallelRaf);s.parallelRaf=null;}
      if(hoveredImgIdx===idx)hoveredImgIdx=-1;
    },s.atConf.outFps*1000/60);

}


function clearTT(){textTimers.forEach(t=>clearTimeout(t));textTimers=[];}
function clearIT(){imgTimers.forEach(t=>clearTimeout(t));imgTimers=[];Object.values(imgSM).forEach(s=>{if(s.outTimer)clearTimeout(s.outTimer);if(s.parallelRaf)cancelAnimationFrame(s.parallelRaf);if(s.tlTimers)s.tlTimers.forEach(t=>clearTimeout(t));});imgSM={};hoveredImgIdx=-1;}

// ── Evaluate <if> blocks using current sw/vr runtime state ──────
function evalIf(text){
  function evalCond(condStr){
    const ms=condStr.match(/^sw_(\d+):(on|off)$/i);
    if(ms){return ms[2].toLowerCase()==='on'?sw[+ms[1]]===true:sw[+ms[1]]===false;}
    const mv=condStr.match(/^var_(\d+)(==|!=|>=|<=|>|<)(-?\d+)$/);
    if(mv){const v=vr[+mv[1]]??0,r=+mv[3];return mv[2]==='=='?v==r:mv[2]==='!='?v!=r:mv[2]==='>'?v>r:mv[2]==='>='?v>=r:mv[2]==='<'?v<r:v<=r;}
    return false;
  }
  function splitElse(inner){
    let d=0;
    for(let i=0;i<inner.length;i++){
      if(inner.slice(i).match(/^<if\s/i))d++;
      else if(inner.slice(i).match(/^<\/if>/i)){if(d===0)break;d--;}
      else if(d===0&&inner.slice(i).match(/^<else>/i)){
        const ei=inner.lastIndexOf('</else>');
        return{a:inner.slice(0,i),b:inner.slice(i+6,ei>=0?ei:undefined)};
      }
    }
    return{a:inner,b:''};
  }
  let out='',pos=0;
  while(pos<text.length){
    const rest=text.slice(pos);
    const im=rest.match(/^([\s\S]*?)<if\s+([^>]+)>/i);
    if(!im){out+=rest;break;}
    out+=im[1];
    const condTrue=evalCond(im[2].trim());
    let start=pos+im[0].length,depth=1,i=start;
    while(i<text.length&&depth>0){
      if(text.slice(i).match(/^<if\s/i))depth++;
      else if(text.slice(i).match(/^<\/if>/i))depth--;
      if(depth>0)i++;else break;
    }
    const{a,b}=splitElse(text.slice(start,i));
    out+=evalIf(condTrue?a:b);
    pos=i+5;
  }
  return out;
}
// ── Replace <var_N> bare with current value ───────────────────
function applyVarDisplay(text){
  return text.replace(/<var_(\d+)>/gi,(_,n)=>String(vr[+n]??0));
}
// ── Preprocess: evaluate if-blocks + var display ─────────────
function preprocess(raw){
  return applyVarDisplay(evalIf(raw.replace(new RegExp('<script[\s\S]*?<'+'/script>','gi'),'')));
}
// ── Parse segments from preprocessed text ────────────────────
// Groups: 1,2=delay 3=sw_num 4=sw_val 5=var_num 6=var_op 7=rMin 8=rMax 9=var_fixed 10=goto 11=dlg
function parseSegments(raw){
  const segs=[];
  const re=/<(\d+)f>([\s\S]*?)<\/\1f>|<sw_(\d+):(on|off)>|<var_(\d+)([-+]?=)(?:"(-?\d+)\.\.(\-?\d+)"|(-?\d+\.?\d*))>|<goto:([^>]+)>|<dlg_next>|<dlg:(\d+)>|<url_self:([^>]+)>|<url:([^>]+)>|<click>/gi;
  let last=0,m;
  while((m=re.exec(raw))!==null){
    if(m.index>last)segs.push({type:'text',delay:0,html:raw.slice(last,m.index)});
    if(m[1]!==undefined)       segs.push({type:'text',delay:+m[1]*1000/60,html:m[2]});
    else if(m[3]!==undefined)  segs.push({type:'sw',num:+m[3],val:m[4].toLowerCase()==='on'});
    else if(m[5]!==undefined)  segs.push({type:'var',num:+m[5],op:m[6],rMin:m[7]!==undefined?+m[7]:null,rMax:m[8]!==undefined?+m[8]:null,val:m[9]!==undefined?+m[9]:0});
    else if(m[10]!==undefined) segs.push({type:'goto',id:m[10]});
    else if(m[0].toLowerCase()==='<dlg_next>') segs.push({type:'dlg_next'});
    else if(m[11]!==undefined) segs.push({type:'dlg',idx:+m[11]-1});
    else if(m[12]!==undefined) segs.push({type:'url',href:m[12],target:'_self'});
    else if(m[13]!==undefined) segs.push({type:'url',href:m[13],target:'_blank'});
    else if(m[0].toLowerCase()==='<click>') segs.push({type:'click'});
    last=re.lastIndex;
  }
  if(last<raw.length)segs.push({type:'text',delay:0,html:raw.slice(last)});
  return segs;
}
// ── Execute a single action segment ──────────────────────────
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function execTextAction(seg){
  if(seg.type==='sw'){
    sw[seg.num]=seg.val;
  }else if(seg.type==='var'){
    const v=seg.rMin!==null?randInt(seg.rMin,seg.rMax):seg.val;
    if(seg.op==='=')vr[seg.num]=v;
    else if(seg.op==='+=')vr[seg.num]=(vr[seg.num]??0)+v;
    else if(seg.op==='-=')vr[seg.num]=(vr[seg.num]??0)-v;
  }else if(seg.type==='url'){
    window.open(seg.href,seg.target||'_blank');
  }else if(seg.type==='goto'){
    const ns=SCENES.find(s=>s.id===seg.id);if(ns)gotoScene(ns.id);
  }else if(seg.type==='dlg'){
    jumpDlg(seg.idx);
  }else if(seg.type==='dlg_next'){
    advDlg();
  }
}
function showText(html,onDone){
  clearTT();pendingNavAction=null;
  pendingClickSegs=null;pendingClickOnDone=null;currentPart1=null;currentPart2=null;
  const DT=document.getElementById('DT');DT.innerHTML='';
  runSegs(parseSegments(preprocess(html)),onDone);
}
function runSegs(segs,onDone){
  const DT=document.getElementById('DT');
  const clickIdx=segs.findIndex(s=>s.type==='click');
  const part1=clickIdx>=0?segs.slice(0,clickIdx):segs;
  const part2=clickIdx>=0?segs.slice(clickIdx+1):null;
  currentPart1=part1;currentPart2=part2;pendingClickOnDone=onDone;
  const lastTextIdx=part1.reduce((acc,s,i)=>s.type==='text'?i:acc,-1);
  textFF=part1.some(s=>s.type==='text'&&s.delay>0);
  let cum=0;
  part1.forEach((seg,i)=>{
    if(seg.type==='text'){
      cum+=seg.delay;const c=cum;
      const t=setTimeout(()=>{
        const sp=document.createElement('span');sp.innerHTML=seg.html;
        const ia=DT.querySelector('.inline-arrow');
        if(ia)DT.insertBefore(sp,ia);else DT.appendChild(sp);
        if(i===lastTextIdx){
          textFF=false;
          if(part2!==null){pendingClickSegs=part2;const d=cur&&cur.dialogues[di];if(d)setArrow(d,false);}
          else{if(onDone)onDone();}
        }
      },c);
      textTimers.push(t);
    }else{
      // All action tags (including dlg/dlg_next) execute immediately at cumulative delay
      const c=cum;
      const t=setTimeout(()=>execTextAction(seg),c);
      textTimers.push(t);
    }
  });
  if(lastTextIdx===-1){
    textFF=false;
    if(part2!==null){pendingClickSegs=part2;const d=cur&&cur.dialogues[di];if(d)setArrow(d,false);}
    else{if(onDone)onDone();}
  }
}
function gotoScene(id){const ns=SCENES.find(x=>x.id===id);if(ns)renderScene(ns);}
function jumpDlg(idx){const ni=findNext(cur,idx);if(ni>=0){di=ni;renderDlg();}else showChoices();}
function onDlgClick(){
  if(textFF){
    if(noFF)return;
    const p1=currentPart1||[],p2=currentPart2,cb=pendingClickOnDone;
    clearTT();textFF=false;pendingNavAction=null;
    const DT=document.getElementById('DT');
    DT.innerHTML=''; // clear partial text before appending full version
    let gotoSeg=null;
    p1.forEach(seg=>{
      if(seg.type==='text'){const sp=document.createElement('span');sp.innerHTML=seg.html;const ia=DT.querySelector('.inline-arrow');if(ia)DT.insertBefore(sp,ia);else DT.appendChild(sp);}
      else if(seg.type==='goto'){if(!gotoSeg)gotoSeg=seg;}
      else{execTextAction(seg);}
    });
    if(gotoSeg){execTextAction(gotoSeg);return;}
    if(p2!==null){
      pendingClickSegs=p2;pendingClickOnDone=cb;
      const d=cur&&cur.dialogues[di];if(d)setArrow(d,false);
      return;
    }
    return;
  }
  if(pendingClickSegs!==null){
    const segs=pendingClickSegs,cb=pendingClickOnDone;
    pendingClickSegs=null;pendingClickOnDone=null;currentPart1=null;currentPart2=null;
    runSegs(segs,cb);return;
  }
  if(pendingNavAction){const nav=pendingNavAction;pendingNavAction=null;execTextAction(nav);return;}
  advDlg();
}


function advDlg(){const next=findNext(cur,di+1);if(next>=0){di=next;renderDlg();}else showChoices();}

function showChoices(){
  const CH=document.getElementById('CH'),ARW=document.getElementById('ARW');
  document.getElementById('DT').querySelectorAll('.inline-arrow').forEach(e=>e.remove());
  ARW.style.display='none';CH.innerHTML='';
  const choices=cur.choices||[];if(!choices.length)return; // no choices: freeze (creator defines ending)
  choices.forEach(c=>{const b=document.createElement('button');b.className='cb';b.textContent=c.text||'繼續';b.onclick=()=>{const ns=SCENES.find(x=>x.id===c.target);if(ns)renderScene(ns);};CH.appendChild(b);});
}

function renderScene(s){
  const G=document.getElementById('G');
  G.style.width=(s.width||920)+'px';G.style.height=(s.height||320)+'px';
  cur=s;
  persistSM={}; // clear persistent layers on scene change
  resize();applyBg(document.getElementById('BG'),s);
  di=findNext(s,0);if(di<0){showChoices();return;}renderDlg();
}

function renderDlg(){
  const G=document.getElementById('G'),DB=document.getElementById('DB'),
        NN=document.getElementById('NN'),ARW=document.getElementById('ARW'),CH=document.getElementById('CH');
  // ── Persist-aware cleanup ────────────────────────────────────────
  // Build new dialogue's persist map (name → layer data)
  const d=cur.dialogues[di];
  const newPersist={};
  d.images.forEach((img,i)=>{ if(img.persistName&&img.persist) newPersist[img.persistName]={img,origIdx:i}; });

  // Cancel RAF on persist layers whose name won't continue; remove non-persist GI elements
  G.querySelectorAll('.GI').forEach(el=>{
    const pname=el.dataset.persistName;
    if(pname&&newPersist[pname]){
      // Will be kept – just cancel old parallel RAF so we can restart with new conditions
      const s=imgSM[+el.dataset.imgIdx];
      if(s){if(s.parallelRaf)cancelAnimationFrame(s.parallelRaf);s.parallelRaf=null;}
    }else{
      // Remove – either not persistent or name not in new dialogue
      if(pname&&persistSM[pname]){
        const s=persistSM[pname].sm;
        if(s){if(s.parallelRaf)cancelAnimationFrame(s.parallelRaf);if(s.outTimer)clearTimeout(s.outTimer);if(s.tlTimers)s.tlTimers.forEach(t=>clearTimeout(t));}
        delete persistSM[pname];
      }
      el.remove();
    }
  });
  CH.innerHTML='';
  clearTT();clearIT();textFF=false;noFF=false;pendingNavAction=null;
  document.getElementById('DT').querySelectorAll('.inline-arrow').forEach(e=>e.remove());

  const isLast=findNext(cur,di+1)<0;

  // Build state machine for each image / text layer
  d.images.forEach((img,origIdx)=>{
    // ── Persistent layer: reuse existing DOM element ──
    if(img.persistName&&img.persist&&persistSM[img.persistName]){
      const ps=persistSM[img.persistName];
      const el=ps.el, s=ps.sm;
      s.atConf=parseAtConf(img.conditions||'');
      // Update position/size
      if(img.type==='text'){
        const cl=img.color||'#e8e4dc';
        const zBase=img.zLayer==='above'?110:10;
        el.style.cssText='left:'+img.x+'px;top:'+img.y+'px;width:'+(img.w>0?img.w+'px':'auto')+(img.h>0?';height:'+img.h+'px':'')+';color:'+cl+';z-index:'+(zBase+origIdx)+';'+(s.st!=='hidden'?'visibility:visible;':'visibility:hidden;')+(img.clickEnabled||img.hoverInEnabled||img.hoverOutEnabled?'cursor:pointer;':'');
      }else{
        const zBase=img.zLayer==='above'?110:10;
        el.style.left=img.x+'px';el.style.top=img.y+'px';
        el.style.width=img.w>0?img.w+'px':'auto';el.style.height=img.h>0?img.h+'px':'auto';
        el.style.zIndex=zBase+origIdx;
      }
      el.dataset.imgIdx=origIdx;
      ps.origIdx=origIdx;
      imgSM[origIdx]=s;
      persistSM[img.persistName].origIdx=origIdx;
      // Re-evaluate @ conditions with new dialogue's settings
      const condsMet=s.atConf.conds.length===0||checkAtConds(s.atConf.conds);
      if(!condsMet&&s.st!=='hidden'){if(s.outTimer)clearTimeout(s.outTimer);if(s.tlTimers)s.tlTimers.forEach(t=>clearTimeout(t));s.st='hidden';showImgState(origIdx);if(hoveredImgIdx===origIdx)hoveredImgIdx=-1;}
      else if(condsMet&&s.st==='hidden'){if(s.atConf.inFps>0){const t=setTimeout(()=>imgAppear(origIdx,s),s.atConf.inFps*1000/60);imgTimers.push(t);}else imgAppear(origIdx,s);}
      // Restart @parallel if needed
      if(s.atConf.parallel){
        let prev=condsMet;
        (function tick(){
          if(imgSM[origIdx]!==s)return;
          const now=checkAtConds(s.atConf.conds);
          if(now&&!prev){prev=true;if(s.atConf.inFps>0){const t=setTimeout(()=>imgAppear(origIdx,s),s.atConf.inFps*1000/60);imgTimers.push(t);}else imgAppear(origIdx,s);}
          else if(!now&&prev){prev=false;if(s.outTimer)clearTimeout(s.outTimer);if(s.tlTimers)s.tlTimers.forEach(t=>clearTimeout(t));s.st='hidden';showImgState(origIdx);if(hoveredImgIdx===origIdx)hoveredImgIdx=-1;}
          s.parallelRaf=requestAnimationFrame(tick);
        })();
      }
      return; // skip normal creation
    }
    // ──────────────────────────────────────────────────────────────
    if(img.type==='text'){
      const el=document.createElement('div');
      el.className='GI TL';el.dataset.imgIdx=origIdx;
      const zBase=img.zLayer==='above'?110:10;
      const cl=img.color||'#e8e4dc';
      el.style.cssText='left:'+img.x+'px;top:'+img.y+'px;width:'+(img.w>0?img.w+'px':'auto')+(img.h>0?';height:'+img.h+'px':'')+';color:'+cl+';z-index:'+(zBase+origIdx)+';visibility:hidden;'+(img.clickEnabled||img.hoverInEnabled||img.hoverOutEnabled?'cursor:pointer;':'');
      G.insertBefore(el,DB);
      const atConf=parseAtConf(img.conditions||'');
      const s={el,st:'hidden',atConf,outTimer:null,parallelRaf:null,tlTimers:[]};
      imgSM[origIdx]=s;
      if(img.persistName&&img.persist){el.dataset.persistName=img.persistName;persistSM[img.persistName]={el,sm:s,origIdx};}
      const initMet=atConf.conds.length===0||checkAtConds(atConf.conds);
      if(initMet){
        if(atConf.inFps>0){const t=setTimeout(()=>imgAppear(origIdx,s),atConf.inFps*1000/60);imgTimers.push(t);}
        else imgAppear(origIdx,s);
      }
      if(atConf.parallel){
        let prev=initMet;
        (function tick(){
          if(imgSM[origIdx]!==s)return;
          const now=checkAtConds(atConf.conds);
          if(now&&!prev){prev=true;if(atConf.inFps>0){const t=setTimeout(()=>imgAppear(origIdx,s),atConf.inFps*1000/60);imgTimers.push(t);}else imgAppear(origIdx,s);}
          else if(!now&&prev){prev=false;if(s.outTimer){clearTimeout(s.outTimer);s.outTimer=null;}if(s.tlTimers)s.tlTimers.forEach(t=>clearTimeout(t));s.st='hidden';showImgState(origIdx);if(hoveredImgIdx===origIdx)hoveredImgIdx=-1;}
          s.parallelRaf=requestAnimationFrame(tick);
        })();
      }
      return;
    }
    if(!img.src)return;
    const el=document.createElement('img');
    el.className='GI';el.src=img.src;el.dataset.imgIdx=origIdx;
    const zBase=img.zLayer==='above'?110:10;
    el.style.cssText='left:'+img.x+'px;top:'+img.y+'px;width:'+(img.w>0?img.w+'px':'auto')+';height:'+(img.h>0?img.h+'px':'auto')+';z-index:'+(zBase+origIdx)+';visibility:hidden;'+(img.clickEnabled?'cursor:pointer;':'');
    G.insertBefore(el,DB);
    const atConf=parseAtConf(img.conditions||'');
    const s={el,st:'hidden',atConf,outTimer:null,parallelRaf:null};
    imgSM[origIdx]=s;
    if(img.persistName&&img.persist){el.dataset.persistName=img.persistName;persistSM[img.persistName]={el,sm:s,origIdx};}
    const initMet=atConf.conds.length===0||checkAtConds(atConf.conds);
    if(initMet){
      if(atConf.inFps>0){const t=setTimeout(()=>imgAppear(origIdx,s),atConf.inFps*1000/60);imgTimers.push(t);}
      else imgAppear(origIdx,s);
    }
    if(atConf.parallel){
      let prev=initMet;
      function tick(){
        if(imgSM[origIdx]!==s)return;
        const now=checkAtConds(atConf.conds);
        if(now&&!prev){prev=true;if(atConf.inFps>0){const t=setTimeout(()=>imgAppear(origIdx,s),atConf.inFps*1000/60);imgTimers.push(t);}else imgAppear(origIdx,s);}
        else if(!now&&prev){prev=false;if(s.outTimer){clearTimeout(s.outTimer);s.outTimer=null;}s.st='hidden';showImgState(origIdx);if(hoveredImgIdx===origIdx)hoveredImgIdx=-1;}
        s.parallelRaf=requestAnimationFrame(tick);
      }
      s.parallelRaf=requestAnimationFrame(tick);
    }
  });

  // noFF: fast-forward blocked when any image or text layer uses @parallel
  noFF=d.images.some(img=>img&&img.conditions&&img.conditions.includes('@parallel'))
      ||(d.textLayers||[]).some(tl=>tl&&tl.conditions&&tl.conditions.includes('@parallel'))
      ||Object.values(persistSM).some(p=>p.sm&&p.sm.atConf&&p.sm.atConf.parallel);

  if(d.showBox){
    const hasClick=d.text&&d.text.toLowerCase().includes('<click>');
    applyBox(d,!isLast||hasClick);
    NN.textContent=d.npcName||'';
    showText(d.text,()=>{setArrow(d,isLast&&!pendingClickSegs);if(isLast&&!pendingClickSegs)showChoices();});
    if(d.arrowWait===false) setArrow(d,isLast&&!hasClick);
    if(isLast&&!hasClick)showChoices();
  }else{
    DB.style.cssText='display:none';DB.className='';DB.onclick=null;
    NN.textContent='';
    const _DT=document.getElementById('DT');
    _DT.innerHTML='';_DT.classList.remove('free-pos');_DT.style.left='';_DT.style.top='';
    const _DB=document.getElementById('DB');
    if(_DT.parentElement!==_DB)_DB.appendChild(_DT);
    ARW.style.display='none';
    // Still process tags even when box is hidden.
    // Since there's no clickable box, nav/click tags auto-fire after completion.
    showText(d.text,()=>{
      if(pendingClickSegs!==null){
        const segs=pendingClickSegs,cb=pendingClickOnDone;
        pendingClickSegs=null;pendingClickOnDone=null;currentPart1=null;currentPart2=null;
        runSegs(segs,cb);
      }else if(pendingNavAction){
        const nav=pendingNavAction;pendingNavAction=null;execTextAction(nav);
      }else if(isLast){
        showChoices();
      }else{
        advDlg();
      }
    });
  }
}

function showEnd(){/* no-op: creator defines own ending */}
function resize(){if(!cur)return;document.getElementById('G').style.transform='scale(1)';}
window.addEventListener('resize',resize);

// ── Delegated interaction handlers (click, hover) ───────────────
(function(){
  const G=document.getElementById('G');
  function inRect(el,e){const r=el.getBoundingClientRect();return e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;}
  function sortedGI(){return Array.from(G.querySelectorAll('.GI')).map(el=>({el,z:+el.style.zIndex||0})).sort((a,b)=>b.z-a.z);}
  function execTags(tags){if(tags)parseSegments(preprocess(tags)).forEach(seg=>{if(seg.type!=='text')execTextAction(seg);});}
  function topOpaqueImg(e){
    for(const{el}of sortedGI()){
      if(el.style.visibility==='hidden')continue;
      if(!inRect(el,e))continue;
      const idx=+el.dataset.imgIdx;
      const img=cur&&cur.dialogues[di]?cur.dialogues[di].images[idx]:null;if(!img)continue;
      if(img.type==='text'){return idx;}
      if(!img.includeTransparent&&!isClickOpaque(el,e))continue;
      return idx;
    }
    return -1;
  }

  // ── Hover tracking ──────────────────────────────────────────────
  function handleHoverLeave(idx){
    const s=imgSM[idx];const img=cur&&cur.dialogues[di]?cur.dialogues[di].images[idx]:null;
    if(!s||!img||s.st==='hidden')return;
    if(img.hoverOutEnabled){s.st='hoverOut';showImgState(idx);execTags(img.hoverOutTags);}
    else if(s.st==='hoverIn'){s.st='base';showImgState(idx);}
  }
  function handleHoverEnter(idx){
    const s=imgSM[idx];const img=cur&&cur.dialogues[di]?cur.dialogues[di].images[idx]:null;
    if(!s||!img||s.st==='hidden'||s.st==='clicked')return;
    if(img.hoverInEnabled){s.st='hoverIn';showImgState(idx);execTags(img.hoverInTags);}
  }
  G.addEventListener('mousemove',function(e){
    if(!cur)return;
    const newHov=topOpaqueImg(e);
    if(newHov!==hoveredImgIdx){
      if(hoveredImgIdx>=0)handleHoverLeave(hoveredImgIdx);
      if(newHov>=0)handleHoverEnter(newHov);
      hoveredImgIdx=newHov;
    }
  });
  G.addEventListener('mouseleave',function(){
    if(hoveredImgIdx>=0){handleHoverLeave(hoveredImgIdx);hoveredImgIdx=-1;}
  });

  // ── Click handler ───────────────────────────────────────────────
  G.addEventListener('click',function(e){
    if(e.target.closest('#CH'))return;
    const DB=document.getElementById('DB');
    const dbZ=100;
    const sorted=sortedGI();
    let dbChecked=false;
    function tryDB(){if(!dbChecked){dbChecked=true;if(DB.classList.contains('clickable')&&inRect(DB,e)){onDlgClick();return true;}}return false;}
    for(const{el,z}of sorted){
      if(!dbChecked&&z<dbZ&&tryDB())return;
      if(!inRect(el,e))continue;
      const origIdx=+el.dataset.imgIdx;
      const img=cur&&cur.dialogues[di]?cur.dialogues[di].images[origIdx]:null;if(!img)continue;
      const opaque=img.includeTransparent||isClickOpaque(el,e);
      if(!opaque)continue;
      const s=imgSM[origIdx];
      if(!s||s.st==='hidden')continue;
      // Click toggle: re-click restores
      if(s.st==='clicked'&&img.clickToggle){
        s.st=hoveredImgIdx===origIdx&&img.hoverInEnabled?'hoverIn':'base';
        showImgState(origIdx);return;
      }
      if(img.clickEnabled){
        s.st='clicked';showImgState(origIdx);execTags(img.clickTags);return;
      }
      return; // opaque, no click interaction – absorb
    }
    if(!dbChecked)tryDB();
  });
})();


renderScene(SCENES.find(s=>s.id===START)||SCENES[0]);
</script>
